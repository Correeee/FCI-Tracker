<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Inter';
            src: url('Inter.ttf') format('truetype');
            font-weight: normal;
        }

        :root {
            --bg-page: #f9f9f9;
            --bg-card: #ffffff;
            --text-main: #000000;
            --text-sub: #666666;
            --positive: #27ae60;
            --negative: #d63031;
            --accent: #000000;
        }

        body { 
            width: 450px; 
            font-family: 'Inter', sans-serif; 
            padding: 20px; 
            background: var(--bg-page); 
            margin: 0; 
            overflow-x: hidden;
            color: var(--text-main);
        }

        .card { 
            background: var(--bg-card); 
            padding: 24px; 
            border-radius: 28px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04); 
            margin-bottom: 12px; 
            border: 1px solid #f0f0f0;
        }

        label { 
            font-size: 11px; 
            color: var(--text-sub); 
            font-weight: 800; 
            text-transform: uppercase; 
            display: block; 
            margin-top: 12px; 
            letter-spacing: 0.5px;
        }

        input, select { 
            width: 100%; 
            padding: 10px 14px; 
            margin: 6px 0; 
            border: 1px solid #e5e5e5; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 13px; 
            font-family: 'Inter', sans-serif;
            transition: border-color 0.2s;
        }

        input:focus { border-color: var(--accent); outline: none; }

        #listaFondos { 
            max-height: 150px; 
            overflow-y: auto; 
            border: 1px solid #eee; 
            display: none; 
            background: white; 
            position: absolute; 
            width: 370px; 
            z-index: 100; 
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-top: -5px;
        }

        .fondo-item { padding: 10px 14px; cursor: pointer; font-size: 12px; border-bottom: 1px solid #f9f9f9; font-weight: 500; }
        .fondo-item:hover { background: #f4f4f4; }

        .selected-fondo { 
            background: #000; 
            color: #fff; 
            padding: 12px 16px; 
            border-radius: 14px; 
            font-size: 11px; 
            margin: 12px 0; 
            font-weight: 600; 
            word-break: break-all; 
        }

        .result { text-align: center; padding: 10px 0; }
        
        .balance { 
            font-family: 'Inter', sans-serif;
            font-size: 36px !important; 
            font-weight: 300; 
            color: var(--accent); 
            letter-spacing: -1.5px;
        }

        #usdContent { 
            text-align: center; 
            margin-top: 15px; 
            padding-top: 15px; 
            border-top: 1px solid #f0f0f0; 
        }

        #valUSD { 
            font-family: 'Inter', sans-serif;
            font-size: 24px; 
            font-weight: 300; 
            color: var(--positive); 
        }

        #cotizacionMEP { font-size: 10px; color: var(--text-sub); margin-top: 4px; font-weight: 600; }

        .info-extra { 
            font-size: 11px; 
            color: var(--text-sub); 
            margin-top: 10px; 
            display: flex; 
            justify-content: center; 
            gap: 15px; 
            font-weight: 500;
        }
        
        .info-extra strong { color: var(--text-main); font-weight: 700; }

        .btn-group { display: flex; gap: 8px; margin-top: 15px; }

        button { 
            padding: 12px; 
            border: none; 
            border-radius: 14px; 
            cursor: pointer; 
            font-weight: 700; 
            font-size: 13px; 
            font-family: 'Inter', sans-serif;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.85; }

        #btnGuardar, #btnRecargar { background: var(--accent); color: white; }
        #btnReset { background: #fff; color: #000; border: 1px solid #e5e5e5; }
        #btnAgregarDinero { background: var(--accent); color: white; flex: 0 0 40px; font-size: 18px; border-radius: 12px; }
        #btnConfirmarAporte { background: var(--accent); color: white; border-radius: 12px; }

        #sectionAporte { 
            display: none; 
            background: #f7f7f7; 
            padding: 16px; 
            border-radius: 18px; 
            margin-top: 12px; 
            border: 1px solid #eee; 
        }

        .radio-group { display: flex; gap: 12px; justify-content: center; margin-top: 10px; }
        .radio-group label { text-transform: none; font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; color: var(--text-main); }

        summary { 
            font-size: 12px; 
            font-weight: 700; 
            color: var(--accent); 
            cursor: pointer; 
            outline: none; 
            margin-bottom: 5px; 
            display: list-item; 
        }

        .vermas__recargar { display: flex; flex-direction: row; gap: 10px; padding: 0 10px; }
        
        #btnVerMas { background: none; color: #000; border: none; cursor: pointer; font-size: 12px; font-weight: 700; text-decoration: underline; width: 100%; }
        
        @keyframes sweep { 0% {opacity: 0; transform: translateY(-5px)} 100% {opacity: 1; transform: translateY(0)} }
        details[open] summary ~ * { animation: sweep 0.3s ease-in-out; }
    </style>
</head>
<body>
    <div class="card">
        <details>
            <summary>Configuración de Cuenta</summary>
            <label>Usuario</label>
            <input type="text" id="nombreUsuario" placeholder="Tu nombre">
            <label>Categoría</label>
            <select id="tipoFondo">
                <option value="rentaFija">Renta Fija</option>
                <option value="moneyMarket">Money Market</option>
                <option value="rentaMixta">Renta Mixta</option>
                <option value="rentaVariable">Renta Variable</option>
            </select>
            <label>Buscar Fondo</label>
            <input type="text" id="buscador" placeholder="Ej: SBS, Balanz...">
            <div id="listaFondos"></div>
            <div id="fondoElegidoDisplay" class="selected-fondo" style="display:none"></div>

            <label>Inversión (ARS)</label>
            <div style="display: flex; gap: 8px; align-items: center;">
                <input type="number" id="miInversion" placeholder="Monto">
                <button id="btnAgregarDinero" title="Suscripción/Rescate">+</button>
            </div>

            <div id="sectionAporte">
                <label style="margin-top: 0;">Dinero a mover</label>
                <div style="display: flex; gap: 8px;">
                    <input type="number" id="inputNuevoAporte" placeholder="$ 0.00">
                    <button id="btnConfirmarAporte" style="flex: 0 0 60px;">OK</button>
                </div>
                <div class="radio-group">
                    <label><input type="radio" name="tipoMov" value="sumar" checked> Suscripción</label>
                    <label><input type="radio" name="tipoMov" value="restar"> Rescate</label>
                </div>
            </div>

            <div class="btn-group" style="margin-bottom: 10px;">
                <button id="btnGuardar">Guardar</button>
                <button id="btnReset">Reset</button>
            </div>
        </details>

        <div id="content" class="result">
            <div style="font-size:12px; color:#999">Cargando...</div>
        </div>

        <div class="info-extra">
            <span>VCP: <strong id="valVCP">--</strong></span>
            <span>Cierre: <strong id="fechaVCP">--</strong></span>
        </div>

        <div id="usdContent" style="display:none">
            <div id="valUSD"></div>
            <div id="cotizacionMEP"></div>
        </div>
    </div>

    <div class="vermas__recargar">
        <button id="btnVerMas">Ver historial completo</button>
        <button id="btnRecargar">Actualizar</button>
    </div>

    <script src="popup.js"></script>
</body>
</html>
