<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Mi Historial de Inversiones - Dashboard</title>
    <script src="chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Waldenburg-ML';
            src: url('Waldenburg-ML.ttf') format('truetype');
            font-weight: normal;
        }

        :root {
            --bg-page: #f9f9f9;
            --bg-card: #ffffff;
            --text-main: #000000;
            --text-sub: #666666;
            --positive: #27ae60;
            --negative: #d63031;
            --accent: #000000;
        }

        body {
            font-family: 'Inter', sans-serif;
            padding: 40px 20px;
            background: var(--bg-page);
            color: var(--text-main);
            line-height: 1.6;
            margin: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: var(--bg-card);
            padding: 60px;
            border-radius: 40px;
            box-shadow: 0 4px 40px rgba(0, 0, 0, 0.02);
        }

        /* TÍTULOS CON WALDENBURG */
        h1,
        .titulo-seccion {
            font-family: 'Waldenburg-ML', sans-serif;
            font-size: 48px;
            font-weight: 300;
            letter-spacing: -1.5px;
            margin: 0;
        }

        .subtitle {
            font-family: 'Inter', sans-serif;
            color: var(--text-sub);
            font-size: 16px;
            margin-top: 8px;
            font-weight: 400;
        }

        .user-badge {
            font-family: 'Inter', sans-serif;
            color: white;
            background: #000;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            width: fit-content;
        }

        .usd-info {
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            color: var(--positive);
            font-weight: 700;
        }

        .filter-bar {
            display: flex;
            gap: 16px;
            align-items: center;
            margin-bottom: 40px;
            padding-top: 30px;
            border-top: 1px solid #f0f0f0;
        }

        .filter-group input {
            font-family: 'Inter', sans-serif;
            padding: 14px 20px;
            border: 1px solid #e5e5e5;
            border-radius: 16px;
            font-size: 14px;
        }

        .btn-reset-filter,
        .btn-dropdown {
            font-family: 'Inter', sans-serif;
            border-radius: 16px;
            padding: 14px 24px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s;
        }

        .btn-reset-filter {
            background: #fff;
            border: 1px solid #e5e5e5;
        }

        .btn-dropdown {
            background: #000 !important;
            color: #fff;
            border: none;
        }

        .chart-container {
            margin: 50px 0;
            height: 380px;
        }

        /* TABLA LIMPIA CON INTER */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
            font-family: 'Inter', sans-serif;
        }

        th {
            text-align: left;
            padding: 12px 24px;
            color: var(--text-sub);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        td {
            padding: 24px;
            background: #fff;
            border-top: 1px solid #f0f0f0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
            color: #333;
        }

        td:first-child {
            border-left: 1px solid #f0f0f0;
            border-radius: 24px 0 0 24px;
        }

        td:last-child {
            border-right: 1px solid #f0f0f0;
            border-radius: 0 24px 24px 0;
        }

        #btnExportar {
            font-family: 'Inter', sans-serif;
            background: #000 !important;
            color: #fff;
            padding: 18px 32px;
            border-radius: 50px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            position: fixed;
            bottom: 40px;
            right: 40px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        }
        .dolar__badge{
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }
        .btn-dropdown:hover, #btnExportar:hover, #btnSiguiente:hover, #btnAnterior:hover{
            background: #6E6E6E !important;
            transition: 0.2s !important;
        }
    </style>
</head>

<body>
    <div class="container">
        <header id="header-section">
            <div>
                <h1 class="titulo-waldenburg">Inversiones de: <span id="displayUsuario">...</span></h1>
                <p class="subtitle">Evolución bimonetaria de tus activos.</p>
                <div class="dolar__badge">
                    <div id="cotizacionHoy" class="usd-info">-</div>
                    <div class="user-badge" id="badgeFondo">-</div>
                </div>

                <div id="vcpInfo"></div>
            </div>
        </header>

        <div class="filter-bar">
            <div class="filter-group"><input type="date" id="fechaDesde"></div>
            <div class="filter-group"><input type="date" id="fechaHasta"></div>
            <button class="btn-reset-filter" id="resetFiltro">Reset</button>

            <div class="dropdown-visibilidad" style="position: relative;">
                <button class="btn-dropdown" id="btnVisibilidad">Personalizar Vista</button>
                <div class="dropdown-content" id="menuVisibilidad"
                    style="display: none; position: absolute; background: white; min-width: 240px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); z-index: 1000; padding: 24px; border-radius: 24px; right: 0; margin-top: 12px; border: 1px solid #f0f0f0;">
                    <label
                        style="display: flex; align-items: center; gap: 12px; font-size: 14px; padding: 10px 0; cursor: pointer; font-family:'Inter'"><input
                            type="checkbox" class="toggle-vis" data-target="rendimiento-proyectado" checked> Rendimiento
                        Proyectado</label>
                    <label
                        style="display: flex; align-items: center; gap: 12px; font-size: 14px; padding: 10px 0; cursor: pointer; font-family:'Inter'"><input
                            type="checkbox" class="toggle-vis" data-target="proyeccion-mensual" checked> Proyección
                        Mensual</label>
                    <label
                        style="display: flex; align-items: center; gap: 12px; font-size: 14px; padding: 10px 0; cursor: pointer; font-family:'Inter'"><input
                            type="checkbox" class="toggle-vis" data-target="tarjeta-totales" checked> Balance y
                        Totales</label>
                    <label
                        style="display: flex; align-items: center; gap: 12px; font-size: 14px; padding: 10px 0; cursor: pointer; font-family:'Inter'"><input
                            type="checkbox" class="toggle-vis" data-target="grafico-section" checked> Gráfico</label>
                    <label
                        style="display: flex; align-items: center; gap: 12px; font-size: 14px; padding: 10px 0; cursor: pointer; font-family:'Inter'"><input
                            type="checkbox" class="toggle-vis" data-target="tabla-section" checked> Tabla
                        Historial</label>
                </div>
            </div>

            <div style="margin-left: auto; font-size: 14px; font-weight: 700; font-family:'Inter'">
                <span id="cantRegistros" style="color: #000;">--</span> Registros
            </div>
        </div>

        <div class="chart-container" id="grafico-section">
            <canvas id="graficoEvolucion"></canvas>
        </div>

        <div id="tabla-section">
            <table>
                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Dinero (ARS)</th>
                        <th>Dinero (USD)</th>
                        <th>Ganancia</th>
                        <th>Var %</th>
                    </tr>
                </thead>
                <tbody id="cuerpoTablaFull"></tbody>
            </table>
        </div>
    </div>
    <div id="controlesPaginacion"></div>
    <button id="btnExportar">Descargar reporte</button>
    <script src="dashboard.js"></script>
</body>

</html>
